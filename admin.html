<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CleverStack — Admin Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-login{
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--paper);
    }
    .login-card{
      background:var(--paper-2); border-radius:var(--radius); padding:48px 40px;
      box-shadow:var(--shadow); text-align:center; max-width:420px; width:100%;
    }
    .login-card h1{ font-size:1.5rem; margin-bottom:8px; }
    .login-card p{ color:var(--text-muted); margin-bottom:28px; font-size:0.95rem; }
    .login-card input{
      width:100%; padding:14px 18px; border:1px solid var(--border); border-radius:var(--radius-sm);
      font-size:1rem; font-family:var(--font-body); background:var(--paper); color:var(--text-dark);
      outline:none; margin-bottom:16px; transition:border-color 0.2s;
    }
    .login-card input:focus{ border-color:var(--indigo); }
    .login-card .btn{
      width:100%; padding:14px; background:var(--indigo); color:#fff; border:none;
      border-radius:var(--radius-sm); font-size:1rem; font-weight:600; cursor:pointer;
      font-family:var(--font-body); transition:transform 0.15s, box-shadow 0.15s;
    }
    .login-card .btn:hover{ transform:translateY(-1px); box-shadow:var(--shadow-sm); }
    .login-card .btn:active{ transform:translateY(0); }
    .login-error{
      color:var(--coral); font-size:0.9rem; margin-bottom:12px; display:none;
    }

    .admin-dashboard{ display:none; min-height:100vh; background:var(--paper); }
    .admin-header{
      background:var(--paper-2); border-bottom:1px solid var(--border);
      padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .admin-header .brand{ display:flex; align-items:center; gap:12px; }
    .admin-header .brand img{ height:32px; }
    .admin-header .brand h2{ font-size:1.1rem; font-family:var(--font-display); }
    .admin-header .brand span{
      background:var(--indigo); color:#fff; padding:2px 10px; border-radius:100px;
      font-size:0.75rem; font-weight:600;
    }
    .admin-header .header-actions{ display:flex; gap:12px; align-items:center; }
    .admin-header .btn-sm{
      padding:8px 16px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--paper-2); color:var(--text-dark); font-size:0.85rem; cursor:pointer;
      font-family:var(--font-body); font-weight:500; transition:all 0.15s;
    }
    .admin-header .btn-sm:hover{ background:var(--paper-3); }
    .admin-header .btn-sm.danger{ border-color:var(--coral); color:var(--coral); }
    .admin-header .btn-sm.danger:hover{ background:var(--coral); color:#fff; }

    .admin-body{ max-width:960px; margin:0 auto; padding:32px 24px; }

    .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
    .stat-card{
      background:var(--paper-2); border-radius:var(--radius); padding:24px;
      box-shadow:var(--shadow-sm); text-align:center;
    }
    .stat-card .stat-num{
      font-size:2.2rem; font-weight:700; font-family:var(--font-display); color:var(--indigo);
      line-height:1;
    }
    .stat-card .stat-label{ color:var(--text-muted); font-size:0.85rem; margin-top:6px; }
    .stat-card.unread .stat-num{ color:var(--coral); }

    .submissions-header{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px;
    }
    .submissions-header h3{ font-size:1.1rem; }
    .filter-btns{ display:flex; gap:8px; }
    .filter-btn{
      padding:6px 14px; border-radius:100px; border:1px solid var(--border);
      background:transparent; color:var(--text-muted); font-size:0.8rem; cursor:pointer;
      font-family:var(--font-body); transition:all 0.15s;
    }
    .filter-btn.active{ background:var(--indigo); color:#fff; border-color:var(--indigo); }

    .submission-list{ display:flex; flex-direction:column; gap:12px; }

    .submission-card{
      background:var(--paper-2); border-radius:var(--radius); padding:20px 24px;
      box-shadow:var(--shadow-sm); cursor:pointer; border-left:4px solid transparent;
      transition:border-color 0.15s, box-shadow 0.15s;
    }
    .submission-card.unread{ border-left-color:var(--coral); }
    .submission-card:hover{ box-shadow:var(--shadow); }
    .submission-card .card-top{
      display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
    }
    .submission-card .card-name{ font-weight:600; font-size:1rem; }
    .submission-card .card-date{ color:var(--text-muted); font-size:0.8rem; }
    .submission-card .card-email{ color:var(--text-muted); font-size:0.85rem; margin-bottom:4px; }
    .submission-card .card-snippet{
      color:var(--text-muted); font-size:0.9rem; line-height:1.5;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }

    .submission-detail{
      display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
    }
    .submission-detail.open{ display:block; }
    .submission-detail .detail-row{
      display:flex; gap:12px; margin-bottom:8px; font-size:0.9rem;
    }
    .submission-detail .detail-label{
      color:var(--text-muted); font-weight:500; min-width:80px;
    }
    .submission-detail .detail-value{ color:var(--text-dark); }
    .submission-detail .detail-message{
      margin-top:12px; padding:16px; background:var(--paper); border-radius:var(--radius-sm);
      font-size:0.95rem; line-height:1.7; color:var(--text-dark); white-space:pre-wrap;
    }
    .submission-detail .detail-actions{ margin-top:16px; display:flex; gap:10px; }
    .submission-detail .detail-actions button{
      padding:8px 18px; border-radius:var(--radius-sm); font-size:0.85rem; cursor:pointer;
      font-family:var(--font-body); font-weight:500; transition:all 0.15s;
    }
    .btn-mark-read{ background:var(--teal); color:#fff; border:none; }
    .btn-mark-read:hover{ opacity:0.85; }
    .btn-delete{ background:transparent; color:var(--coral); border:1px solid var(--coral); }
    .btn-delete:hover{ background:var(--coral); color:#fff; }
    .btn-copy{ background:transparent; color:var(--text-muted); border:1px solid var(--border); }
    .btn-copy:hover{ background:var(--paper-3); }

    .empty-state{
      text-align:center; padding:60px 20px; color:var(--text-muted);
    }
    .empty-state .empty-icon{ font-size:3rem; margin-bottom:12px; opacity:0.4; }
    .empty-state h4{ color:var(--text-dark); margin-bottom:6px; }

    .loading{ text-align:center; padding:40px; color:var(--text-muted); }
    .toast{
      position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff;
      padding:14px 22px; border-radius:var(--radius-sm); font-size:0.9rem;
      box-shadow:var(--shadow); opacity:0; transform:translateY(12px);
      transition:opacity 0.3s, transform 0.3s; z-index:999; pointer-events:none;
    }
    .toast.show{ opacity:1; transform:translateY(0); pointer-events:auto; }

    @media(max-width:640px){
      .stats-row{ grid-template-columns:1fr; }
      .admin-header{ flex-direction:column; gap:12px; }
      .admin-body{ padding:20px 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="admin-login" id="loginScreen">
    <div class="login-card">
      <h1>CleverStack</h1>
      <p>Admin Dashboard — Contact Submissions</p>
      <div class="login-error" id="loginError"></div>
      <input type="password" id="loginPassword" placeholder="Enter admin password" autofocus>
      <button class="btn" id="loginBtn">Sign In</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="admin-dashboard" id="dashboard">
    <div class="admin-header">
      <div class="brand">
        <h2>CleverStack <span>ADMIN</span></h2>
      </div>
      <div class="header-actions">
        <button class="btn-sm" id="refreshBtn">Refresh</button>
        <button class="btn-sm danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="admin-body">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">—</div>
          <div class="stat-label">Total Submissions</div>
        </div>
        <div class="stat-card unread">
          <div class="stat-num" id="statUnread">—</div>
          <div class="stat-label">Unread</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statToday">—</div>
          <div class="stat-label">Today</div>
        </div>
      </div>

      <div class="submissions-header">
        <h3>Submissions</h3>
        <div class="filter-btns">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="unread">Unread</button>
        </div>
      </div>

      <div class="submission-list" id="submissionList">
        <div class="loading">Loading submissions...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var API_BASE = '/api/admin';
    var token = sessionStorage.getItem('admin_token') || '';
    var currentFilter = 'all';
    var submissions = [];

    // Elements
    var loginScreen = document.getElementById('loginScreen');
    var dashboard = document.getElementById('dashboard');
    var loginPassword = document.getElementById('loginPassword');
    var loginBtn = document.getElementById('loginBtn');
    var loginError = document.getElementById('loginError');
    var logoutBtn = document.getElementById('logoutBtn');
    var refreshBtn = document.getElementById('refreshBtn');
    var submissionList = document.getElementById('submissionList');
    var statTotal = document.getElementById('statTotal');
    var statUnread = document.getElementById('statUnread');
    var statToday = document.getElementById('statToday');
    var toast = document.getElementById('toast');

    function showToast(msg, duration){
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, duration || 2500);
    }

    async function apiCall(method, path, body){
      var opts = {
        method: method,
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        }
      };
      if (body) opts.body = JSON.stringify(body);
      var res = await fetch(API_BASE + path, opts);
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function formatDate(dateStr){
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'Z');
      var now = new Date();
      var diff = now - d;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function isToday(dateStr){
      if (!dateStr) return false;
      var d = new Date(dateStr + 'Z');
      var now = new Date();
      return d.toDateString() === now.toDateString();
    }

    function escapeHtml(str){
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }

    function renderSubmissions(){
      var filtered = submissions;
      if (currentFilter === 'unread'){
        filtered = submissions.filter(function(s){ return !s.is_read; });
      }

      if (filtered.length === 0){
        submissionList.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">📭</div>' +
            '<h4>No submissions ' + (currentFilter === 'unread' ? '(all read!)' : '') + '</h4>' +
            '<p>' + (currentFilter === 'unread' ? 'All caught up.' : 'Submissions will appear here when visitors contact you.') + '</p>' +
          '</div>';
        return;
      }

      var html = '';
      filtered.forEach(function(s){
        var unreadClass = s.is_read ? '' : ' unread';
        html += '<div class="submission-card' + unreadClass + '" data-id="' + s.id + '">';
        html += '<div class="card-top">';
        html += '<span class="card-name">' + escapeHtml(s.name) + '</span>';
        html += '<span class="card-date">' + formatDate(s.created_at) + '</span>';
        html += '</div>';
        html += '<div class="card-email">' + escapeHtml(s.email) + '</div>';
        html += '<div class="card-snippet">' + escapeHtml(s.message) + '</div>';
        html += '<div class="submission-detail" id="detail-' + s.id + '">';
        html += '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">' + escapeHtml(s.name) + '</span></div>';
        html += '<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">' + escapeHtml(s.email) + '</span></div>';
        html += '<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">' + escapeHtml(s.phone) + '</span></div>';
        html += '<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">' + formatDate(s.created_at) + '</span></div>';
        html += '<div class="detail-row"><span class="detail-label">Source</span><span class="detail-value">' + escapeHtml(s.source) + '</span></div>';
        html += '<div class="detail-message">' + escapeHtml(s.message) + '</div>';
        html += '<div class="detail-actions">';
        html += '<button class="btn-copy" onclick="event.stopPropagation();copyEmail(\'' + escapeHtml(s.email) + '\')">Copy Email</button>';
        if (!s.is_read){
          html += '<button class="btn-mark-read" onclick="event.stopPropagation();markRead(' + s.id + ')">Mark Read</button>';
        }
        html += '<button class="btn-delete" onclick="event.stopPropagation();deleteSubmission(' + s.id + ')">Delete</button>';
        html += '</div>';
        html += '</div></div>';
      });

      submissionList.innerHTML = html;

      // Click to expand
      var cards = submissionList.querySelectorAll('.submission-card');
      cards.forEach(function(card){
        card.addEventListener('click', function(){
          var id = card.getAttribute('data-id');
          var detail = document.getElementById('detail-' + id);
          if (detail) detail.classList.toggle('open');
        });
      });
    }

    window.copyEmail = function(email){
      navigator.clipboard.writeText(email).then(function(){
        showToast('Email copied: ' + email);
      });
    };

    window.markRead = async function(id){
      try {
        await apiCall('POST', '', { action:'mark_read', id:id });
        var sub = submissions.find(function(s){ return s.id === id; });
        if (sub) sub.is_read = 1;
        renderSubmissions();
        loadStats();
        showToast('Marked as read');
      } catch(e){ showToast('Error: ' + e.message); }
    };

    window.deleteSubmission = async function(id){
      if (!confirm('Delete this submission permanently?')) return;
      try {
        await apiCall('POST', '', { action:'delete', id:id });
        submissions = submissions.filter(function(s){ return s.id !== id; });
        renderSubmissions();
        loadStats();
        showToast('Deleted');
      } catch(e){ showToast('Error: ' + e.message); }
    };

    async function loadStats(){
      try {
        var data = await apiCall('GET', '?count=true');
        statTotal.textContent = data.total || 0;
        statUnread.textContent = data.unread || 0;
        var todayCount = submissions.filter(function(s){ return isToday(s.created_at); }).length;
        statToday.textContent = todayCount;
      } catch(e){}
    }

    async function loadSubmissions(){
      submissionList.innerHTML = '<div class="loading">Loading...</div>';
      try {
        var data = await apiCall('GET', '?limit=100');
        submissions = data.submissions || [];
        renderSubmissions();
        loadStats();
      } catch(e){
        submissionList.innerHTML = '<div class="empty-state"><h4>Failed to load</h4><p>' + escapeHtml(e.message) + '</p></div>';
      }
    }

    // Login
    loginBtn.addEventListener('click', doLogin);
    loginPassword.addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });

    async function doLogin(){
      var pw = loginPassword.value.trim();
      if (!pw){ loginError.textContent = 'Enter a password'; loginError.style.display = 'block'; return; }
      token = pw;
      try {
        await apiCall('GET', '?count=true');
        sessionStorage.setItem('admin_token', token);
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        loadSubmissions();
      } catch(e){
        loginError.textContent = e.message || 'Invalid password';
        loginError.style.display = 'block';
        token = '';
      }
    }

    // Logout
    logoutBtn.addEventListener('click', function(){
      token = '';
      sessionStorage.removeItem('admin_token');
      dashboard.style.display = 'none';
      loginScreen.style.display = 'flex';
      loginPassword.value = '';
      loginError.style.display = 'none';
    });

    // Refresh
    refreshBtn.addEventListener('click', loadSubmissions);

    // Filters
    var filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(function(btn){
      btn.addEventListener('click', function(){
        filterBtns.forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderSubmissions();
      });
    });

    // Auto-login if token saved
    if (token){
      apiCall('GET', '?count=true').then(function(){
        dashboard.style.display = 'block';
        loginScreen.style.display = 'none';
        loadSubmissions();
      }).catch(function(){
        sessionStorage.removeItem('admin_token');
        token = '';
      });
    }
  })();
  </script>
</body>
</html>
